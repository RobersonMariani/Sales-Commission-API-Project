services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: sales-api-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - sales-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    build:
      context: .docker/nginx
      dockerfile: Dockerfile
    container_name: sales-api-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
    networks:
      - sales-network
    depends_on:
      - app

  mysql:
    image: mysql:9.0
    container_name: sales-api-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sales_commission}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-sales_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./.docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales-network

  redis:
    image: redis:alpine
    container_name: sales-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - sales-network

  queue:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: sales-api-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www
    networks:
      - sales-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: sales-api-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    networks:
      - sales-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mailpit:
    image: axllent/mailpit
    container_name: sales-api-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sales-network

networks:
  sales-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
